version: "3.8"

networks:
  trabajobd_network:
    driver: bridge

volumes:
  pg-data:
  minio-data:

services:
  # =======================================================
  # PostgreSQL (productos_db)
  # =======================================================
  postgres:
    image: postgres:15
    container_name: postgres
    hostname: postgres
    restart: unless-stopped
    command: postgres -c password_encryption=md5
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5435:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      # scripts de inicialización
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - trabajobd_network

  # =======================================================
  # Trino
  # =======================================================
  trino:
    image: trinodb/trino:latest
    container_name: trino
    hostname: trino
    restart: unless-stopped
    user: root
    environment:
      - TRINO_CONFIG_DIR=/etc/trino
      - HADOOP_CONF_DIR=/etc/hadoop/conf
    volumes:
      - ./trino/conf:/etc/trino
      - ./trino/conf/catalog:/etc/trino/catalog
      - ./trino/conf/core-site.xml:/etc/hadoop/conf/core-site.xml
      - ./trino/plugin/hive/hadoop-aws-3.3.4.jar:/usr/lib/trino/lib/hadoop-aws-3.3.4.jar
      - ./trino/plugin/hive/aws-java-sdk-bundle-1.12.262.jar:/usr/lib/trino/lib/aws-java-sdk-bundle-1.12.262.jar
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    networks:
      - trabajobd_network

  # =======================================================
  # MinIO (almacenamiento S3-compatible)
  # =======================================================
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Consola web
    volumes:
      - minio-data:/data
    networks:
      - trabajobd_network

  # =======================================================
  # MinIO Init — crea el bucket al arrancar
  # =======================================================
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/datalake;
      exit 0;
      "
    networks:
      - trabajobd_network

  # =======================================================
  # Hive Metastore (necesario para que Trino indexe Parquet)
  # =======================================================
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    hostname: hive-metastore
    restart: on-failure:5
    entrypoint: >
      /bin/bash -c "
      export HADOOP_CLASSPATH=/opt/hadoop/share/hadoop/tools/lib/*;
      exec /opt/hive/bin/hive --skiphadoopversion --skiphbasecp --service metastore
      "
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HADOOP_CLIENT_OPTS: >-
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=demo
        -Djavax.jdo.option.ConnectionPassword=demo123
    volumes:
      - ./trino/conf/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
    ports:
      - "9083:9083"
    depends_on:
      - postgres
      - minio
    networks:
      - trabajobd_network
